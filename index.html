<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FFF7EC">
<title>Anu's Reading Words</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFF7EC;
    --paper2:#FFE9CF;
    --ink:#33294A;
    --ink-soft:#6B5F82;
    --card:#FFFFFF;
    --go:#2DAE6E;          /* "I read it" green */
    --go-dark:#21925B;
    --help:#FB9134;        /* "Help me" amber */
    --help-dark:#E07A1C;
    --pink:#FF5C8A;
    --purple:#7C5CFF;
    --sky:#3FBFE0;
    --shadow:0 14px 0 rgba(51,41,74,.10), 0 22px 40px rgba(51,41,74,.16);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Fredoka',system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 80% at 50% -10%, #FFFDF8 0%, var(--paper) 45%, var(--paper2) 100%) fixed;
    overflow:hidden;
    -webkit-user-select:none; user-select:none;
    touch-action:manipulation;
  }
  .wrap{
    height:100%; max-width:560px; margin:0 auto;
    display:flex; flex-direction:column; padding:14px 16px 20px;
  }

  /* ---- Top bar ---- */
  .topbar{display:flex; align-items:center; gap:10px;}
  .chip{
    display:flex; align-items:center; gap:6px;
    background:var(--card); border:3px solid #fff;
    box-shadow:0 6px 0 rgba(51,41,74,.08), 0 10px 18px rgba(51,41,74,.10);
    border-radius:999px; padding:8px 14px; font-weight:600; font-size:16px;
    color:var(--ink);
  }
  .chip .lvl-emoji{font-size:18px; line-height:1;}
  .stars-chip{margin-left:auto; color:#B8860B;}
  .stars-chip .num{font-weight:700; font-size:18px;}
  .gear{
    width:48px; height:48px; flex:0 0 auto; border:none; cursor:pointer;
    background:var(--card); border-radius:16px;
    box-shadow:0 6px 0 rgba(51,41,74,.08), 0 10px 18px rgba(51,41,74,.10);
    font-size:22px; color:var(--ink-soft);
  }
  .gear:active{transform:translateY(3px); box-shadow:0 3px 0 rgba(51,41,74,.08);}

  /* ---- Card area ---- */
  .stage{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; position:relative;}
  .prompt{
    font-size:19px; font-weight:600; color:var(--ink-soft);
    min-height:26px; text-align:center; letter-spacing:.2px;
  }
  .card{
    width:100%; background:var(--card); border-radius:34px;
    border:5px solid #fff; box-shadow:var(--shadow);
    padding:30px 20px 26px; text-align:center; position:relative;
  }
  .word{
    font-family:'Andika', sans-serif;
    font-weight:700; line-height:1;
    font-size:clamp(78px, 30vw, 150px);
    letter-spacing:2px; word-break:break-word;
  }
  .word .ltr{display:inline-block; transition:transform .15s ease, color .15s ease;}
  .word .ltr.lit{color:var(--pink); transform:translateY(-10px) scale(1.12);}
  .pop{animation:pop .42s cubic-bezier(.2,1.3,.5,1);}
  @keyframes pop{0%{transform:scale(.4) rotate(-6deg); opacity:0;}60%{transform:scale(1.07) rotate(2deg);}100%{transform:scale(1) rotate(0); opacity:1;}}

  .hear{
    margin-top:14px; display:inline-flex; align-items:center; gap:9px;
    border:none; cursor:pointer; background:var(--sky); color:#fff;
    font-family:'Fredoka'; font-weight:600; font-size:18px;
    padding:12px 22px; border-radius:999px;
    box-shadow:0 6px 0 #259cbb;
  }
  .hear:active{transform:translateY(4px); box-shadow:0 2px 0 #259cbb;}
  .hear .ico{font-size:22px;}

  /* ---- Bottom buttons ---- */
  .actions{display:flex; gap:14px; margin-top:8px;}
  .big{
    flex:1; border:none; cursor:pointer; color:#fff;
    font-family:'Fredoka'; font-weight:700; font-size:22px;
    padding:22px 10px; border-radius:24px; line-height:1.1;
  }
  .big small{display:block; font-weight:500; font-size:14px; opacity:.92; margin-top:3px;}
  .go{background:var(--go); box-shadow:0 8px 0 var(--go-dark);}
  .go:active{transform:translateY(5px); box-shadow:0 3px 0 var(--go-dark);}
  .helpbtn{background:var(--help); box-shadow:0 8px 0 var(--help-dark);}
  .helpbtn:active{transform:translateY(5px); box-shadow:0 3px 0 var(--help-dark);}
  .said{flex:1; background:var(--purple); box-shadow:0 8px 0 #5a3fd6;}
  .said:active{transform:translateY(5px); box-shadow:0 3px 0 #5a3fd6;}

  /* ---- Toast / scripture ---- */
  .toast{
    position:fixed; left:50%; top:18%; transform:translateX(-50%) translateY(-12px);
    background:var(--ink); color:#fff; padding:14px 20px; border-radius:18px;
    font-weight:500; font-size:17px; max-width:88%; text-align:center;
    box-shadow:0 16px 36px rgba(0,0,0,.28); opacity:0; pointer-events:none;
    transition:opacity .3s ease, transform .3s ease; z-index:60;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .toast .ref{display:block; margin-top:5px; font-size:13px; opacity:.7; font-weight:600;}

  /* ---- Confetti ---- */
  .confetti{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50;}
  .conf{position:absolute; font-size:26px; will-change:transform,opacity; animation:fall 1.1s ease-out forwards;}
  @keyframes fall{0%{transform:translateY(0) scale(.6) rotate(0); opacity:1;}100%{transform:translateY(-220px) scale(1.2) rotate(220deg); opacity:0;}}

  /* ---- Settings modal ---- */
  .overlay{
    position:fixed; inset:0; background:rgba(51,41,74,.45);
    display:none; align-items:center; justify-content:center; padding:20px; z-index:80;
  }
  .overlay.open{display:flex;}
  .sheet{
    width:100%; max-width:440px; background:var(--card); border-radius:28px;
    padding:22px; box-shadow:0 30px 60px rgba(0,0,0,.3); max-height:86vh; overflow:auto;
  }
  .sheet h2{font-family:'Fredoka'; font-weight:700; margin:0 0 4px; font-size:24px;}
  .sheet .sub{color:var(--ink-soft); margin:0 0 16px; font-size:15px;}
  .levels{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .lvlbtn{
    border:3px solid #EFE7DA; background:#FFFDF8; cursor:pointer;
    border-radius:16px; padding:12px 10px; text-align:left;
    font-family:'Fredoka'; font-weight:600; font-size:15px; color:var(--ink);
    display:flex; align-items:center; gap:8px;
  }
  .lvlbtn .e{font-size:20px;}
  .lvlbtn .ct{display:block; font-size:12px; color:var(--ink-soft); font-weight:500;}
  .lvlbtn.sel{border-color:var(--go); background:#EAF8F0;}
  .row{display:flex; gap:10px; margin-top:16px;}
  .ghost{
    flex:1; border:3px solid #EFE7DA; background:#fff; cursor:pointer;
    border-radius:16px; padding:13px; font-family:'Fredoka'; font-weight:600; font-size:15px; color:var(--ink-soft);
  }
  .solid{
    flex:1; border:none; background:var(--ink); color:#fff; cursor:pointer;
    border-radius:16px; padding:13px; font-family:'Fredoka'; font-weight:700; font-size:16px;
  }
  .pinpad{text-align:center;}
  .pin-dots{font-size:30px; letter-spacing:10px; min-height:40px; color:var(--ink); margin:6px 0 14px;}
  .keys{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:280px; margin:0 auto;}
  .key{
    border:none; background:#FFFDF8; border:3px solid #EFE7DA; cursor:pointer;
    border-radius:16px; padding:16px 0; font-family:'Fredoka'; font-weight:700; font-size:24px; color:var(--ink);
  }
  .key:active{transform:translateY(3px);}
  .hidden{display:none !important;}
  .err{color:var(--pink); font-weight:600; min-height:20px; margin-top:8px;}

  /* ---- Mic round ---- */
  #micView, #breakView{
    background:radial-gradient(120% 80% at 50% -10%, #FFFDF8 0%, var(--paper) 45%, var(--paper2) 100%);
  }
  .micbox{width:100%; max-width:460px; text-align:center;}
  .mic-eyebrow{font-weight:700; font-size:21px; color:var(--purple); letter-spacing:.3px;}
  .mic-instruction{font-size:18px; color:var(--ink-soft); margin:6px 0 18px; font-weight:600;}
  .mic-word{
    font-family:'Andika', sans-serif; font-weight:700; color:var(--ink);
    font-size:clamp(64px,22vw,124px); line-height:1; margin-bottom:26px; letter-spacing:2px;
  }
  .micbtn{
    display:inline-flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    width:172px; height:172px; border-radius:50%; border:none; cursor:pointer;
    background:var(--purple); color:#fff; font-family:'Fredoka'; font-weight:700; font-size:18px;
    box-shadow:0 12px 0 #5a3fd6, 0 18px 30px rgba(124,92,255,.40);
  }
  .micbtn .mic-ico{font-size:54px; line-height:1;}
  .micbtn:active{transform:translateY(6px); box-shadow:0 6px 0 #5a3fd6;}
  .micbtn.listening{
    background:var(--pink); box-shadow:0 12px 0 #d63b6e, 0 0 0 0 rgba(255,92,138,.6);
    animation:pulse 1.15s ease-out infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 12px 0 #d63b6e, 0 0 0 0 rgba(255,92,138,.55);}
    70%{box-shadow:0 12px 0 #d63b6e, 0 0 0 28px rgba(255,92,138,0);}
    100%{box-shadow:0 12px 0 #d63b6e, 0 0 0 0 rgba(255,92,138,0);}
  }
  .mic-status{min-height:28px; margin-top:18px; font-weight:600; font-size:18px; color:var(--ink-soft);}
  /* ---- Break ---- */
  .breakbox{width:100%; max-width:460px; text-align:center;}
  .break-emoji{font-size:66px; line-height:1;}
  .break-title{font-family:'Fredoka'; font-weight:700; font-size:30px; color:var(--ink); margin-top:8px;}
  .break-sub{font-size:18px; color:var(--ink-soft); margin:6px 0 14px; font-weight:600;}
  .break-time{
    font-family:'Fredoka'; font-weight:700; font-size:66px; color:var(--purple);
    margin-bottom:26px; font-variant-numeric:tabular-nums; letter-spacing:1px;
  }

  @media (prefers-reduced-motion: reduce){
    .pop,.conf,.micbtn.listening{animation:none;}
    .big:active,.gear:active,.hear:active,.said:active,.micbtn:active{transform:none;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="chip"><span class="lvl-emoji" id="lvlEmoji">🅰️</span><span id="lvlName">Two Letters</span></div>
    <div class="chip stars-chip">⭐<span class="num" id="starNum">0</span></div>
    <button class="gear" id="gearBtn" aria-label="Grown-up settings">⚙️</button>
  </div>

  <div class="stage">
    <div class="prompt" id="prompt" aria-live="polite">Read it out loud 👀</div>
    <div class="card">
      <div class="word" id="word">cat</div>
      <button class="hear" id="hearBtn"><span class="ico">🔊</span> Sound it out</button>
    </div>
  </div>

  <div class="actions" id="tryActions">
    <button class="big go" id="gotItBtn">I read it!<small>tap when you said it</small></button>
    <button class="big helpbtn" id="helpBtn">Help me<small>I'll say it for you</small></button>
  </div>
  <div class="actions hidden" id="helpActions">
    <button class="big said" id="saidItBtn">I said it! ✅<small>now your turn</small></button>
  </div>
</div>

<!-- Mic round -->
<div class="overlay" id="micView">
  <div class="micbox">
    <div class="mic-eyebrow">🎤 Show me!</div>
    <div class="mic-instruction" id="micPrompt">Tap the mic and say it</div>
    <div class="mic-word" id="micWord">cat</div>
    <button class="micbtn" id="micBtn"><span class="mic-ico" id="micIco">🎤</span><span id="micBtnLabel">Tap &amp; say it</span></button>
    <div class="mic-status" id="micStatus"></div>
  </div>
</div>

<!-- Break -->
<div class="overlay" id="breakView">
  <div class="breakbox">
    <div class="break-emoji">🌿</div>
    <div class="break-title">Great work, Anu!</div>
    <div class="break-sub" id="breakSub">Time for a little rest.</div>
    <div class="break-time" id="breakTime">5:00</div>
    <button class="big said" id="breakBtn" style="max-width:280px; margin:0 auto;">I'm ready! ▶</button>
  </div>
</div>

<div class="confetti" id="confetti"></div>
<div class="toast" id="toast"></div>

<!-- Settings -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <!-- PIN gate -->
    <div id="pinView" class="pinpad">
      <h2>Grown-ups only</h2>
      <p class="sub">Enter the code to change settings.</p>
      <div class="pin-dots" id="pinDots"></div>
      <div class="keys" id="keys"></div>
      <div class="err" id="pinErr"></div>
      <div class="row"><button class="ghost" id="pinCancel">Close</button></div>
    </div>
    <!-- Settings body -->
    <div id="setView" class="hidden">
      <h2>Settings</h2>
      <p class="sub">Pick a word set for Anu to practice.</p>
      <div class="levels" id="levelGrid"></div>
      <div class="row">
        <button class="ghost" id="resetStars">Reset stars</button>
        <button class="solid" id="closeSet">Done</button>
      </div>
    </div>
  </div>
</div>

<script>
/* =========================================================

   Vanilla ES5, Safari / iOS friendly.  Audio via speechSynthesis.
   ========================================================= */
(function(){
  "use strict";

  /* ---------- Word bank (300 real, decodable, kid-safe words) ---------- */
  var BANK = [

    {name:"Sight Words", emoji:"⭐", words:["the","a","i","are","was","you","she","his","her","him","one","two","out","our","who","new","few","saw","yes","has","put","use","ask","add","any","boy","car","eye","far","toy","old","off","own"]},
    {name:"Magic E", emoji:"✨", words:["cake","lake","make","take","bake","wake","sake","cave","gave","wave","save","name","game","came","fame","tame","same","gate","late","date","hate","mate","gaze","maze","face","race","lace","page","cage","made","fade","wade","safe","tape","cape","sale","tale","pale","male","gale","cane","lane","mane","pane","fate","rate","bale","vane","dale","haze","daze","wage","rake","sane","bike","hike","like","bite","kite","site","mite","dime","time","lime","mime","dive","five","hive","live","ride","side","hide","tide","wide","ripe","wipe","pipe","wine","dine","line","mine","nine","pine","vine","fine","fire","hire","wire","file","mile","pile","tile","life","wife","dice","mice","nice","rice","vice","bile","tire","size","bone","cone","lone","tone","zone","home","dome","nose","rose","hose","pose","hole","mole","pole","role","sole","joke","poke","woke","yoke","bore","core","more","sore","tore","wore","code","mode","node","rode","rope","cope","dope","hope","mope","note","vote","dote","dove","cove","dose","cube","tube","cute","mute","dune","tune","rude","rule","mule","fume","fuse","duke","cure","pure","sure","lure"]},

    {name:"Strong Endings", emoji:"🏁", words:["camp","damp","lamp","ramp","jump","lump","bump","dump","pump","limp","wimp","romp","band","hand","land","sand","bend","lend","mend","send","tend","bond","fond","pond","fund","find","kind","mind","wind","bent","dent","lent","rent","sent","tent","vent","went","hint","lint","mint","tint","font","hunt","punt","runt","bank","rank","sank","tank","yank","link","mink","pink","rink","sink","wink","bunk","dunk","hunk","junk","sunk","honk","monk","best","nest","pest","rest","test","vest","west","zest","fist","list","mist","fast","last","mast","past","vast","cost","lost","dust","gust","just","must","desk","disk","dusk","husk","mask","task","tusk","risk","gasp","lisp","wisp","wasp","gift","lift","sift","raft","soft","loft","tuft","belt","felt","melt","jolt","bolt","colt","halt","salt","silt","tilt","wilt","hilt","milk","silk","bulk","sulk","hulk","gulp","help","kelp","yelp","pulp","golf","gulf","self","fact","duct","pact"]},
    {name:"Letter Teams", emoji:"👫", words:["ship","shop","shot","shut","shed","shin","shun","fish","dish","wish","wash","cash","dash","gash","hash","mash","rash","sash","gush","hush","mush","rush","gosh","posh","bash","lush","push","bush","chin","chip","chop","chap","chat","chum","much","such","rich","inch","chew","chow","that","them","then","thin","this","thud","with","bath","math","moth","oath","path","both","thaw","thee","whim","whip","when","whiz","what","whom"]},
    {name:"Vowel Teams", emoji:"🚣", words:["rain","main","pain","gain","vain","wait","bait","fail","jail","mail","nail","pail","rail","sail","tail","hail","maid","paid","raid","away","seat","neat","beat","heat","meat","bean","dean","lean","mean","bead","lead","read","beak","leak","peak","weak","heal","meal","peal","real","seal","heap","leap","reap","team","beam","east","leaf","year","hear","near","fear","dear","gear","tear","feet","meet","beet","deep","deed","feed","heed","need","reed","seed","weed","beep","jeep","keep","peep","seep","weep","beef","reef","peek","seek","week","peel","feel","heel","keel","reel","been","seen","teen","keen","deer","beer","peer","jeer","leer","boat","coat","goat","moat","road","toad","load","foam","roam","soap","soak","coal","goal","coax","book","cook","hook","look","took","nook","boom","room","zoom","doom","loom","food","mood","good","hood","wood","foot","hoot","root","boot","toot","loot","moon","noon","soon","pool","cool","fool","tool","wool","roof","hoof","show","flow","blow","know","down","town","gown"]},
    {name:"Bossy R", emoji:"🦜", words:["barn","cart","card","hard","lard","yard","dark","mark","park","bark","lark","harm","farm","arch","star","harp","tart","part","dart","mart","arms","cars","born","corn","horn","torn","worn","cord","ford","fork","pork","cork","fort","port","sort","word","work","worm","herd","term","fern","perk","jerk","bird","dirt","girl","firm","burn","turn","curl","hurt","surf","curb","turf","purr"]},

  var EVERYTHING = {name:"Everything", emoji:"🌟", words:[]};
  for (var b=0;b<BANK.length;b++){ EVERYTHING.words = EVERYTHING.words.concat(BANK[b].words); }

  /* ---------- Tiny safe storage (works in preview, persists when deployed) ---------- */
  function load(key, dflt){
    try { var v = window.localStorage.getItem(key); return v===null ? dflt : v; }
    catch(e){ return dflt; }
  }
  function save(key, val){
    try { window.localStorage.setItem(key, val); } catch(e){}
  }

  /* ---------- State ---------- */
  var PIN = "2020";
  var stars = parseInt(load("anu_stars","0"),10) || 0;
  var levelIndex = parseInt(load("anu_level","0"),10);
  if (isNaN(levelIndex) || levelIndex < 0 || levelIndex > BANK.length) levelIndex = 0;
  var queue = [];
  var qi = 0;
  var mode = "try";        // "try" | "help"
  var speaking = false;
  var seq = 0;             // sequence id: bumped whenever the word or audio changes
  var readCount = 0;       // confident "I read it!" taps in the current block
  var recent = [];         // words read this block (mic round picks from these)
  var WORDS_PER_ROUND = 10;
  var Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
  var recogOK = !!Rec;
  var micDenied = false;
  var micTarget = "", micAttempts = 0, micPending = false, micTimer = null, recog = null;
  var breakTimer = null, breakSecs = 300;

  /* ---------- Elements ---------- */
  var $ = function(id){ return document.getElementById(id); };
  var wordEl = $("word"), promptEl = $("prompt");
  var lvlNameEl = $("lvlName"), lvlEmojiEl = $("lvlEmoji"), starNumEl = $("starNum");
  var tryActions = $("tryActions"), helpActions = $("helpActions");

  /* ---------- Speech ---------- */
  var voice = null;
  function loadVoice(){
    try{
      var vs = window.speechSynthesis.getVoices();
      if (!vs || !vs.length) return;
      var pick = null, i;
      for (i=0;i<vs.length;i++){ if (/en[-_]US/i.test(vs[i].lang) && /female|samantha|karen|victoria|zira|google us/i.test(vs[i].name)){ pick = vs[i]; break; } }
      if (!pick) for (i=0;i<vs.length;i++){ if (/^en/i.test(vs[i].lang)){ pick = vs[i]; break; } }
      voice = pick || vs[0];
    }catch(e){}
  }
  if ("speechSynthesis" in window){
    loadVoice();
    window.speechSynthesis.onvoiceschanged = loadVoice;
  }
  function speak(text, rate, cb){
    if (!("speechSynthesis" in window) || !text){ if(cb) cb(); return; }
    try{
      var synth = window.speechSynthesis;
      // Only cancel if something is actually queued/playing. Cancelling an idle
      // engine is what makes iOS Safari silently drop the next word.
      if (synth.speaking || synth.pending){ synth.cancel(); }
      var u = new SpeechSynthesisUtterance(text);
      u.rate = rate || 0.82; u.pitch = 1.08; u.volume = 1;
      u.lang = "en-US";
      if (voice) u.voice = voice;
      u.onend = function(){ speaking=false; if(cb) cb(); };
      u.onerror = function(){ speaking=false; if(cb) cb(); };
      speaking = true;
      synth.speak(u);
      // iOS sometimes parks the engine paused; nudge it awake.
      if (synth.paused){ synth.resume(); }
    }catch(e){ speaking=false; if(cb) cb(); }
  }

  // Stop any audio and invalidate the current sound-it-out sequence.
  function stopSpeech(){
    try{ var s = window.speechSynthesis; if (s && (s.speaking || s.pending)){ s.cancel(); } }catch(e){}
    speaking = false;
    seq++;
  }

  /* ---------- Build / shuffle queue ---------- */
  function currentLevel(){ return levelIndex >= BANK.length ? EVERYTHING : BANK[levelIndex]; }
  function shuffle(arr){
    var a = arr.slice(), i, j, t;
    for (i=a.length-1;i>0;i--){ j=Math.floor(Math.random()*(i+1)); t=a[i]; a[i]=a[j]; a[j]=t; }
    return a;
  }
  function buildQueue(){ queue = shuffle(currentLevel().words); qi = 0; }

  /* ---------- Render ---------- */
  function renderHeader(){
    var L = currentLevel();
    lvlNameEl.textContent = L.name;
    lvlEmojiEl.textContent = L.emoji;
    starNumEl.textContent = stars;
  }
  function renderWord(){
    seq++;                 // cancel any spell sequence tied to the previous word
    var w = queue[qi];
    // Size the word to its length so 4-letter words stay on one line on phones.
    wordEl.style.fontSize = w.length >= 4 ? "clamp(56px,17vw,108px)"
                          : (w.length === 3 ? "clamp(76px,26vw,140px)"
                          : "clamp(88px,32vw,150px)");
    wordEl.innerHTML = "";
    for (var i=0;i<w.length;i++){
      var s = document.createElement("span");
      s.className = "ltr"; s.textContent = w.charAt(i);
      wordEl.appendChild(s);
    }
    wordEl.classList.remove("pop"); void wordEl.offsetWidth; wordEl.classList.add("pop");
    setTryMode();
  }
  function setTryMode(){
    mode = "try";
    promptEl.textContent = "Read it out loud 👀";
    tryActions.classList.remove("hidden");
    helpActions.classList.add("hidden");
  }
  function setHelpMode(){
    mode = "help";
    promptEl.textContent = "Say it with me! 🗣️";
    tryActions.classList.add("hidden");
    helpActions.classList.remove("hidden");
  }

  /* ---------- Sound it out: highlight each letter in time with audio ---------- */
  function clearLit(){
    var ls = wordEl.getElementsByClassName("ltr");
    for (var i=0;i<ls.length;i++) ls[i].classList.remove("lit");
  }
  function spellOut(done){
    var w = queue[qi];
    var ls = wordEl.getElementsByClassName("ltr");
    var mine = ++seq;      // claim this sequence; any newer word/tap cancels it
    clearLit();
    var i = 0;
    function step(){
      if (mine !== seq){ clearLit(); return; }       // a newer action took over
      if (i < w.length){
        if (!ls[i]){ return; }                        // spans changed under us; bail safely
        clearLit();
        ls[i].classList.add("lit");
        speak(w.charAt(i), 0.6, function(){ if (mine !== seq) return; i++; setTimeout(step, 130); });
      } else {
        for (var k=0;k<ls.length;k++){ if (ls[k]) ls[k].classList.add("lit"); }
        speak(w, 0.78, function(){ if (mine !== seq) return; setTimeout(function(){ if (mine === seq) clearLit(); if(done) done(); }, 250); });
      }
    }
    step();
  }

  /* ---------- Celebrate ---------- */
  var CHEERS = ["Wonderful!","You did it!","Great reading!","You're a star!","Way to go!","Brilliant!","So smart!","Yay, Anu!","Amazing!","God made you so clever!"];
  var SCRIPTURE = [
    {t:"Your word is a lamp to my feet.", r:"Psalm 119:105"},
    {t:"I am wonderfully made!", r:"Psalm 139:14"},
    {t:"I can do all things through Christ.", r:"Philippians 4:13"},
    {t:"Children are a gift from the Lord.", r:"Psalm 127:3"},
    {t:"Let the little children come to Me.", r:"Matthew 19:14"}
  ];
  var reduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  function confetti(){
    if (reduced) return;
    var box = $("confetti");
    var emojis = ["⭐","🌟","✨","🎉","💛","🌈"];
    for (var i=0;i<16;i++){
      var c = document.createElement("span");
      c.className = "conf";
      c.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      c.style.left = (10 + Math.random()*80) + "%";
      c.style.bottom = (20 + Math.random()*30) + "%";
      c.style.animationDelay = (Math.random()*0.18) + "s";
      c.style.fontSize = (20 + Math.random()*18) + "px";
      box.appendChild(c);
      (function(node){ setTimeout(function(){ if(node.parentNode) node.parentNode.removeChild(node); }, 1300); })(c);
    }
  }
  var toastTimer = null;
  function toast(text, ref){
    var t = $("toast");
    t.innerHTML = text + (ref ? '<span class="ref">— ' + ref + '</span>' : "");
    t.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.classList.remove("show"); }, ref ? 3200 : 1500);
  }
  function giveStar(){
    stars++; save("anu_stars", String(stars)); starNumEl.textContent = stars;
    confetti();
  }
  function awardStar(){
    giveStar();
    if (stars % 10 === 0){
      var sc = SCRIPTURE[Math.floor((stars/10 - 1)) % SCRIPTURE.length];
      toast(sc.t, sc.r);
      speak("Ten stars! " + CHEERS[Math.floor(Math.random()*CHEERS.length)], 0.95);
    } else {
      var cheer = CHEERS[Math.floor(Math.random()*CHEERS.length)];
      toast(cheer);
      speak(cheer, 0.98);
    }
  }

  /* ---------- Next word ---------- */
  function next(){
    qi++;
    if (qi >= queue.length){
      buildQueue();
      toast("Great job! Let's go again 🔁");
    }
    renderWord();
  }

  /* ---------- Events: main loop ---------- */
  $("gotItBtn").addEventListener("click", function(){
    stopSpeech();
    awardStar();
    recent.push(queue[qi]);
    readCount++;
    if (readCount % WORDS_PER_ROUND === 0){
      setTimeout(startMicRound, 800);   // checkpoint after the praise
    } else {
      setTimeout(next, 650);
    }
  });
  $("helpBtn").addEventListener("click", function(){
    stopSpeech();
    setHelpMode();
    var mySeq = seq;
    var w = queue[qi];
    speak(w, 0.78, function(){
      if (mySeq !== seq) return;                         // word changed; don't spell the old one
      setTimeout(function(){ if (mySeq === seq) spellOut(); }, 200);
    });
  });
  $("saidItBtn").addEventListener("click", function(){
    stopSpeech();
    awardStar();
    setTimeout(next, 650);
  });
  $("hearBtn").addEventListener("click", function(){
    stopSpeech();
    spellOut();
  });

  /* ---------- Mic round (Web Speech recognition; Chrome) ---------- */
  var HOMO = {
    to:["two","too"], two:["to","too"], too:["to","two"], "for":["four","fore"], four:["for","fore"],
    by:["bye","buy"], buy:["by","bye"], be:["bee"], bee:["be"], i:["eye","aye"], eye:["i","aye"],
    or:["oar","ore"], no:["know"], know:["no"], one:["won"], won:["one"], hi:["high"], high:["hi"],
    so:["sew","sow"], we:["wee"], wee:["we"], "in":["inn"], inn:["in"], see:["sea"], sea:["see"],
    sun:["son"], son:["sun"], red:["read"], our:["are","hour"], ate:["eight"],
    hear:["here"], here:["hear"], deer:["dear"], dear:["deer"], rose:["rows"], nose:["knows"],
    tail:["tale"], tale:["tail"], mail:["male"], male:["mail"], pale:["pail"], pail:["pale"],
    road:["rode"], way:["weigh"], wait:["weight"], meat:["meet"], meet:["meat"], week:["weak"], weak:["week"]
  };
  function norm(s){ return (s||"").toLowerCase().replace(/[^a-z]/g,""); }
  function matchWord(target, transcript){
    var t = norm(target); if (!t) return false;
    var heard = (transcript||"").toLowerCase().split(/[^a-z]+/);
    var homo = HOMO[t] || [];
    for (var i=0;i<heard.length;i++){
      var h = heard[i]; if (!h) continue;
      if (h === t) return true;
      for (var j=0;j<homo.length;j++){ if (h === homo[j]) return true; }
    }
    return false;
  }
  function micSetUI(label, status, listening){
    $("micBtnLabel").textContent = label;
    $("micStatus").textContent = status || "";
    if (listening) $("micBtn").classList.add("listening");
    else $("micBtn").classList.remove("listening");
  }
  function startMicRound(){
    stopSpeech();
    micTarget = recent.length ? recent[Math.floor(Math.random()*recent.length)] : queue[qi];
    micAttempts = 0; micPending = false;
    $("micWord").textContent = micTarget;
    $("micBtn").classList.remove("listening");
    if (recogOK && !micDenied){
      $("micPrompt").textContent = "Tap the mic and say it";
      micSetUI("Tap & say it", "", false);
    } else {
      $("micPrompt").textContent = "Say it out loud, then tap";
      micSetUI("I said it! \u2B50", "", false);
    }
    $("micView").classList.add("open");
    speak("Can you say this word?", 0.9, function(){
      setTimeout(function(){ speak(micTarget, 0.8); }, 150);
    });
  }
  function micListen(){
    if (!recogOK || micDenied){ micWin(); return; }
    if (micPending) return;
    micPending = true;
    try{
      recog = new Rec();
      recog.lang = "en-US"; recog.interimResults = false;
      recog.maxAlternatives = 5; recog.continuous = false;
      recog.onresult = function(e){
        var ok = false, alts = e.results[0], k;
        for (k=0;k<alts.length;k++){ if (matchWord(micTarget, alts[k].transcript)){ ok = true; break; } }
        micResolve(ok);
      };
      recog.onerror = function(e){
        if (e && (e.error === "not-allowed" || e.error === "service-not-allowed")){
          micDenied = true; micPending = false;
          micSetUI("I said it! \u2B50", "Mic is off \u2014 just tap", false);
          return;
        }
        micResolve(false);
      };
      recog.onend = function(){ if (micPending){ micResolve(false); } };
      recog.start();
      micSetUI("Listening\u2026", "I'm listening \uD83C\uDF99\uFE0F", true);
      if (micTimer) clearTimeout(micTimer);
      micTimer = setTimeout(function(){ try{ recog.stop(); }catch(e){} }, 7000);
    }catch(err){ micResolve(false); }
  }
  function micResolve(ok){
    if (!micPending) return;          // first signal wins; ignore the rest
    micPending = false;
    if (micTimer){ clearTimeout(micTimer); micTimer = null; }
    try{ if (recog){ recog.onresult = recog.onerror = recog.onend = null; } }catch(e){}
    $("micBtn").classList.remove("listening");
    if (ok){ micWin(); return; }
    micAttempts++;
    if (micAttempts < 2){
      micSetUI("Try again", "Let's try again \uD83C\uDFA4", false);
      speak("Try again!", 0.95);
    } else {
      micGiveUp();
    }
  }
  function micWin(){
    giveStar();
    micSetUI("Yes! \uD83C\uDF1F", "You said " + micTarget + "!", false);
    speak("Yes! You said " + micTarget + "!", 0.92);
    setTimeout(function(){ $("micView").classList.remove("open"); startBreak(); }, 1700);
  }
  function micGiveUp(){
    giveStar();
    micSetUI("Good try! \u2B50", "Let's say it together", false);
    speak("Let's say it together. " + micTarget + ". " + micTarget + ".", 0.78);
    setTimeout(function(){ $("micView").classList.remove("open"); startBreak(); }, 2300);
  }
  $("micBtn").addEventListener("click", function(){
    if (micPending){ return; }
    if (recogOK && !micDenied){ micListen(); }
    else { micWin(); }                // no recognition available -> trust the tap
  });

  /* ---------- Break ---------- */
  function fmtTime(s){ var m = Math.floor(s/60), ss = s % 60; return m + ":" + (ss < 10 ? "0" : "") + ss; }
  function startBreak(){
    stopSpeech();
    breakSecs = 300;
    $("breakSub").textContent = "Time for a little rest.";
    $("breakTime").textContent = fmtTime(breakSecs);
    $("breakBtn").textContent = "I'm ready! \u25B6";
    $("breakView").classList.add("open");
    speak("Great work! Take a little rest.", 0.9);
    if (breakTimer) clearInterval(breakTimer);
    breakTimer = setInterval(function(){
      breakSecs--;
      if (breakSecs <= 0){
        breakSecs = 0; clearInterval(breakTimer); breakTimer = null;
        $("breakTime").textContent = "0:00";
        $("breakSub").textContent = "Break's over \u2014 tap when you're ready!";
      } else {
        $("breakTime").textContent = fmtTime(breakSecs);
      }
    }, 1000);
  }
  function endBreak(){
    if (breakTimer){ clearInterval(breakTimer); breakTimer = null; }
    $("breakView").classList.remove("open");
    recent = [];                      // fresh block of 10
    next();
  }
  $("breakBtn").addEventListener("click", endBreak);

  /* ---------- Settings + PIN ---------- */
  var pinEntry = "";
  function renderPinDots(){
    var d = ""; for (var i=0;i<pinEntry.length;i++) d += "●";
    $("pinDots").textContent = d;
  }
  function buildKeys(){
    var keys = $("keys"); keys.innerHTML = "";
    var labels = ["1","2","3","4","5","6","7","8","9","⌫","0","OK"];
    for (var i=0;i<labels.length;i++){
      (function(lbl){
        var k = document.createElement("button");
        k.className = "key"; k.textContent = lbl;
        k.addEventListener("click", function(){
          $("pinErr").textContent = "";
          if (lbl === "⌫"){ pinEntry = pinEntry.slice(0,-1); }
          else if (lbl === "OK"){ checkPin(); return; }
          else if (pinEntry.length < 4){ pinEntry += lbl; }
          renderPinDots();
          if (pinEntry.length === 4) checkPin();
        });
        keys.appendChild(k);
      })(labels[i]);
    }
  }
  function checkPin(){
    if (pinEntry === PIN){
      pinEntry = ""; renderPinDots();
      $("pinView").classList.add("hidden");
      $("setView").classList.remove("hidden");
    } else {
      $("pinErr").textContent = "Try again";
      pinEntry = ""; renderPinDots();
    }
  }
  function buildLevelGrid(){
    var grid = $("levelGrid"); grid.innerHTML = "";
    var items = BANK.concat([EVERYTHING]);
    for (var i=0;i<items.length;i++){
      (function(idx, item){
        var btn = document.createElement("button");
        btn.className = "lvlbtn" + (idx === levelIndex ? " sel" : "");
        btn.innerHTML = '<span class="e">'+item.emoji+'</span><span>'+item.name+'<span class="ct">'+item.words.length+' words</span></span>';
        btn.addEventListener("click", function(){
          levelIndex = idx; save("anu_level", String(idx));
          buildQueue(); renderHeader(); renderWord();
          var all = grid.getElementsByClassName("lvlbtn");
          for (var j=0;j<all.length;j++) all[j].classList.remove("sel");
          btn.classList.add("sel");
        });
        grid.appendChild(btn);
      })(i, items[i]);
    }
  }
  function openSettings(){
    pinEntry = ""; renderPinDots();
    $("pinErr").textContent = "";
    $("pinView").classList.remove("hidden");
    $("setView").classList.add("hidden");
    $("overlay").classList.add("open");
  }
  function closeSettings(){ $("overlay").classList.remove("open"); }

  $("gearBtn").addEventListener("click", openSettings);
  $("pinCancel").addEventListener("click", closeSettings);
  $("closeSet").addEventListener("click", closeSettings);
  $("resetStars").addEventListener("click", function(){
    stars = 0; save("anu_stars","0"); starNumEl.textContent = "0";
    toast("Stars reset ✨");
  });
  $("overlay").addEventListener("click", function(e){ if (e.target === $("overlay")) closeSettings(); });

  /* ---------- Go ---------- */
  buildKeys();
  buildLevelGrid();
  buildQueue();
  renderHeader();
  renderWord();
})();
</script>
</body>
</html>
